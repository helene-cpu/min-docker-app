{% extends "base.html" %}

{% block content %}
<div style="background: black; color: red; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h1>⚠ SYSTEM COMPROMISED ⚠</h1>
    <p>Virus detected. Time remaining:</p>
    <h2 id="timer">Laster...</h2>
    <p>Find and delete the virus before time runs out.</p>
</div>


<script>
const endTime = new Date("{{ end_time }}");

function updateTimer() {
    const now = new Date();
    const diff = endTime - now;

    if (diff <= 0) {
        document.getElementById("timer").innerText = "SYSTEM FAILURE";
        return;
    }

    const minutes = Math.floor(diff / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").innerText =
        "T-" + minutes + ":" + seconds.toString().padStart(2, "0");
}

setInterval(updateTimer, 1000);
updateTimer();
</script>
{% endblock %}
